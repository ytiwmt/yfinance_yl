name: US Stock Market Monitor

on:
  schedule:
    - cron: '47 22 * * 1-5'
    - cron: '2 23 * * 1-5'
    - cron: '17 23 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests lxml

      - name: Run yieldlocation
        continue-on-error: true
        env:
          WEBHOOK_URL_YFINANCE: ${{ secrets.WEBHOOK_URL_YIELDLOACATION }}
        run: python check_yieldlocation.py

      - name: Run growthradar
        continue-on-error: true
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          WEBHOOK_URL_GROWTHRADAR: ${{ secrets.WEBHOOK_URL_GROWTHRADAR }}
        run: python check_growthradar.py

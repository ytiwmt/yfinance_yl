name: US Stock Market Monitor

on:
  schedule:
    # JST 07:47 / 08:02 / 08:17 に実行
    - cron: '47 22 * * 1-5'
    - cron: '2 23 * * 1-5'
    - cron: '17 23 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests lxml

      - name: Run script
        env:
          WEBHOOK_URL_YFINANCE: ${{ secrets.WEBHOOK_URL_YIELDLOACATION }}
        run: python check_yieldlocation.py

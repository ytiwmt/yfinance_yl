name: US Stock Market Monitor

on:
  schedule:
    # 毎日 UTC 22:00 (日本時間 JST 07:00) に実行
    # 米国市場クローズ後のタイミング
    - cron: '0 22 * * 1-5'
  workflow_dispatch: # 手動実行用ボタンを有効化

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests lxml

      - name: Run script
        env:
          # GitHubのSettings > Secretsで登録した名前と一致させる
          WEBHOOK_URL_YFINANCE: ${{ secrets.WEBHOOK_URL_YFINANCE }}
        run: python main.py
